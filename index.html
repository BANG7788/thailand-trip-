<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>泰國探險 🐘</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #FDF6F0; }
        iframe {
            position: absolute;
            top: -55px; /* 關鍵：向上推移 55px 隱藏 Google 橫幅 */
            left: 0;
            width: 100%;
            height: calc(100% + 55px); /* 補回推移的高度 */
            border: none;
        }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/你的指令碼ID/exec"></iframe>
</body>
</html>
